<!DOCTYPE html>
<html>
<head>
    <title>Shared House</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    {% block content %}{% endblock %}
    {% with messages = get_flashed_messages() %}
    {% if messages %}
        <ul class="flashes">
        {% for m in messages %}
            <li>{{ m }}</li>
        {% endfor %}
        </ul>
    {% endif %}
    {% endwith %}
</body>
</html>
