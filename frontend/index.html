<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShareLiving</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <a href="#" onclick="showSection('home')">Home</a>
    <a href="#" onclick="showSection('laundry')">Laundry</a>
    <a href="#" onclick="showSection('dinner')">Dinner</a>
    <a href="#" onclick="showSection('guestroom')">Guestroom</a>
    <a href="#" onclick="showSection('help')">Help</a>

    <span style="margin-left:auto"></span>
</nav>

<section id="home">
    <h1>ShareLiving</h1>
</section>

<section id="laundry" style="display:none">
    <h2>Laundry</h2>
    <div class="laundry-actions">
        <button onclick="showLaundryAdd()">Add booking</button>
        <button onclick="showLaundryList()">Show bookings</button>
    </div>

    <div id="laundry-add" style="display:none">
        <input id="laundry-username" placeholder="Name">
        <input id="laundry-date" type="date">
        <input id="laundry-start" type="time">
        <input id="laundry-end" type="time">
        <button onclick="addLaundryBooking()">Save booking</button>
        <p id="laundry-add-status"></p>
    </div>

    <div id="laundry-list" style="display:none">
        <table id="laundry-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Date</th>
                    <th>Start</th>
                    <th>End</th>
                    <th>Duration</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <p id="laundry-list-status"></p>
    </div>
</section>

<section id="dinner" style="display:none">
    <h2>Dinner</h2>
    <div class="dinner-actions">
        <button onclick="showDinnerAdd()">Add attendance</button>
        <button onclick="showDinnerSummary()">Show attendance</button>
    </div>

    <div id="dinner-add" style="display:none">
        <input id="dinner-username" placeholder="Name">
        <table id="dinner-form-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Eats</th>
                    <th>Cooks</th>
                    <th>Guests</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <button onclick="submitDinnerAttendance()">Save attendance</button>
        <p id="dinner-add-status"></p>
    </div>

    <div id="dinner-summary" style="display:none">
        <table id="dinner-summary-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Cooks</th>
                    <th>Total people</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <p id="dinner-summary-status"></p>
    </div>
</section>

<section id="guestroom" style="display:none">
    <h2>Guestroom</h2>
    <div class="guestroom-actions">
        <button onclick="showGuestroomAdd()">Add booking</button>
        <button onclick="showGuestroomList()">Show bookings</button>
    </div>

    <div id="guestroom-add" style="display:none">
        <input id="guestroom-responsible" placeholder="Responsible name">
        <input id="guestroom-guest" placeholder="Guest name">
        <input id="guestroom-start" type="datetime-local">
        <input id="guestroom-end" type="datetime-local">
        <button onclick="addGuestroomBooking()">Save booking</button>
        <p id="guestroom-add-status"></p>
    </div>

    <div id="guestroom-list" style="display:none">
        <table id="guestroom-table">
            <thead>
                <tr>
                    <th>Responsible</th>
                    <th>Guest</th>
                    <th>Start</th>
                    <th>End</th>
                    <th>Duration</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <p id="guestroom-list-status"></p>
    </div>
</section>

<section id="help" style="display:none">
    <h2>Help</h2>
    <p>Minimal shared living app.</p>
</section>

<script src="main.js"></script>
</body>
</html>
