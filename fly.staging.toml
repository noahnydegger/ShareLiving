# fly.staging.toml app configuration file for the staging environment

app = 'shareliving-staging'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[processes]
app = "/app/.venv/bin/uvicorn app:app --host 0.0.0.0 --port 8080"
